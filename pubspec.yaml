name: examsim_congo
description: "Application mobile de simulation d'examens nationaux - Congo Brazzaville"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.7.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1

  # Firebase
  firebase_core: ^3.8.0
  firebase_auth: ^5.3.4
  cloud_firestore: ^5.6.0
  firebase_storage: ^12.3.7
  firebase_messaging: ^15.2.1
  cloud_functions: ^5.2.1

  # State Management
  flutter_riverpod: ^2.6.1

  # Navigation
  go_router: ^14.6.2

  # File / Image
  image_picker: ^1.1.2
  file_picker: ^8.1.7
  flutter_image_compress: ^2.3.0

  # PDF viewer
  flutter_pdfview: ^1.3.2

  # Local storage (offline)
  hive_flutter: ^1.1.0
  path_provider: ^2.1.5

  # Utils
  intl: ^0.20.1
  cached_network_image: ^3.4.1
  connectivity_plus: ^6.1.1
  dio: ^5.8.0
  uuid: ^4.5.1

  # Permissions
  permission_handler: ^11.3.1

  # Notifications locales
  flutter_local_notifications: ^17.2.4

  # Securite ecran (blocage screenshot Android)
  flutter_windowmanager: ^0.2.0

  # Indicateur de chargement
  shimmer: ^3.0.0

  # Percentage indicator
  percent_indicator: ^4.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.13
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
